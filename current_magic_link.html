<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Votre code d'accès - Embryologie Biodynamique</title>
  <style>
    /* Importation des Google Fonts utilisées sur le site */
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff; /* Fond général blanc */
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: 'Inter', Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; padding: 20px 0;">
    <tr>
      <td align="center">
        <!-- Conteneur Principal Beige (#FAF6ED) -->
        <table width="100%" max-width="500" cellpadding="0" cellspacing="0" border="0" style="max-width: 500px; background-color: #FAF6ED; border-radius: 16px; overflow: hidden; margin: 0 auto;">
          <tr>
            <td align="center" style="padding: 40px 20px;">
              
              <!-- ATTENTION : Remplace l'URL de 'src' ci-dessous par l'URL publique de ton logo ! 
                   Par exemple: https://ton-site.com/icon.png ou l'URL du Storage Supabase -->
              <img src="https://zupimages.net/up/24/22/e3l4.png" alt="Logo" width="48" height="48" style="display: block; border: 0; margin-bottom: 24px;">

              <!-- Sur-titre -->
              <h3 style="margin: 0 0 16px; font-family: 'Inter', Arial, sans-serif; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 2px;">
                TECHNIQUES DOUCES TISSULAIRES
              </h3>

              <!-- Titre principal -->
              <h1 style="margin: 0; font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif; font-size: 32px; font-weight: 400; color: #0f172a; text-transform: uppercase; letter-spacing: 1px; line-height: 1.1;">
                L'EMBRYOLOGIE
              </h1>
              
              <!-- Sous-titre Orange -->
              <h1 style="margin: 0 0 24px; font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif; font-size: 32px; font-weight: 400; color: #F27D33; text-transform: uppercase; letter-spacing: 1px; line-height: 1.1;">
                BIODYNAMIQUE
              </h1>

              <p style="margin: 0 0 24px; font-family: 'Inter', Arial, sans-serif; font-size: 15px; color: #64748b; font-weight: 500;">
                Voici votre code d'accès sécurisé :
              </p>

              <!-- Bloc contenant le Code OTP -->
              <table cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; width: 100%; max-width: 300px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                <tr>
                  <td align="center" style="padding: 24px;">
                    <span style="font-family: 'Inter', Arial, sans-serif; font-size: 36px; font-weight: 700; color: #0f172a; letter-spacing: 8px;">
                      {{ .Token }}
                    </span>
                  </td>
                </tr>
              </table>

              <p style="margin: 0 0 32px; font-family: 'Inter', Arial, sans-serif; font-size: 13px; color: #64748b; line-height: 1.5; padding: 0 20px;">
                Saisissez ce code dans l'application pour valider votre connexion.
              </p>

              <!-- Ligne de séparation -->
              <div style="border-top: 1px solid #e2e8f0; width: 80%; margin: 0 auto 24px;"></div>

              <!-- Footer -->
              <p style="margin: 0; font-family: 'Inter', Arial, sans-serif; font-size: 11px; color: #94a3b8; line-height: 1.6;">
                par Marc Damoiseaux, Ostéopathe D.O<br>
                Réalisation FEELPROD
              </p>

            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
