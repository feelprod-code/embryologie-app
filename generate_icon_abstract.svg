<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <!-- Pure minimal off-white -->
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </radialGradient>

    <!-- Super vibrant minimalist gradients -->
    <!-- Ectoderm: Green -->
    <linearGradient id="ecto" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Endoderm: Blue -->
    <linearGradient id="endo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    
    <!-- Mesoderm: Orange -->
    <linearGradient id="meso" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBD23"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="40" flood-color="#94A3B8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg-grad)"/>

  <!-- The main conceptual form. We abandon the bounding chorionic circle for an infinite abstract feel -->
  
  <g filter="url(#shadow)" transform="translate(0, 0)">
    
    <!-- The Embryonic Disc represented conceptually as crossing pure shapes -->
    
    <!-- Amniotic Cavity (Top) overlapping with Ectoderm (Green) -->
    <!-- We use abstract overlapping shapes to represent development -->
    <circle cx="512" cy="360" r="240" fill="url(#ecto)"/>
    
    <!-- Yolk Sac (Bottom) overlapping with Endoderm (Blue) -->
    <circle cx="512" cy="664" r="240" fill="url(#endo)"/>

    <!-- Developing Mesoderm (Orange) bursting dynamically between them, taking structural space -->
    <path d="M 180 512 C 180 340, 844 340, 844 512 C 844 684, 180 684, 180 512 Z" fill="url(#meso)" filter="url(#soft-glow)"/>
    
  </g>
</svg>
