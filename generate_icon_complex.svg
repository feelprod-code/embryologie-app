<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: TDT Off-White to slight grey -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FAF9F6"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </radialGradient>

    <!-- Colors as requested -->
    <!-- Ectoderm: Green -->
    <linearGradient id="ectoglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Endoderm: Blue -->
    <linearGradient id="endoglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    
    <!-- Mesoderm: Orange -->
    <linearGradient id="mesoglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBD23"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <!-- Cavity colors -->
    <radialGradient id="amniotic-fluid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0F2FE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0.3"/>
    </radialGradient>

    <radialGradient id="yolksac-fluid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FEF08A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FDE047" stop-opacity="0.2"/>
    </radialGradient>

    <radialGradient id="chorionic-fluid" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#F8FAFC" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#94A3B8" stop-opacity="0.3"/>
    </radialGradient>

    <!-- Drop Shadows -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#1E293B" flood-opacity="0.15"/>
    </filter>
    
    <filter id="inner-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Solid Background -->
  <rect width="1024" height="1024" fill="url(#bg-grad)"/>

  <!-- 1. CHORIONIC CAVITY (The outer shell) -->
  <g filter="url(#soft-shadow)">
    <!-- Extraembryonic coelom / Chorionic cavity -->
    <circle cx="512" cy="512" r="440" fill="url(#chorionic-fluid)" stroke="#CBD5E1" stroke-width="8"/>
    
    <!-- Connecting Stalk (Pedicule embryonnaire) -->
    <!-- Connects the top of the amniotic sac to the chorion -->
    <path d="M 512 72 L 460 212 L 564 212 Z" fill="#94A3B8" opacity="0.6"/>

    <!-- THE EMBRYO AND INNER CAVITIES -->
    <!-- We center the embryonic disc at cy=512 -->

    <!-- 2. AMNIOTIC CAVITY (Top) -->
    <!-- The cavity above the ectoderm -->
    <circle cx="512" cy="332" r="180" fill="url(#amniotic-fluid)" stroke="#7DD3FC" stroke-width="6"/>

    <!-- 3. YOLK SAC (Vésicule vitelline) (Bottom) -->
    <!-- The cavity below the endoderm -->
    <circle cx="512" cy="692" r="180" fill="url(#yolksac-fluid)" stroke="#FDE047" stroke-width="6"/>

    <!-- THE 3 GERM LAYERS (Le disque tridermique) -->
    <!-- In the middle, separating the two inner cavities -->
    <g filter="url(#inner-shadow)">
      
      <!-- Mesoderm (Orange) - Middle Layer (widest) -->
      <!-- Spreads out dynamically -->
      <path d="M 280 512 Q 512 550 744 512 Q 512 474 280 512 Z" fill="url(#mesoglow)"/>
      <rect x="252" y="492" width="520" height="40" rx="20" fill="url(#mesoglow)"/>
      
      <!-- Ectoderm (Green) - Top Layer -->
      <!-- Floor of the amniotic cavity -->
      <path d="M 332 492 Q 512 520 692 492 Q 512 462 332 492 Z" fill="url(#ectoglow)"/>
      <rect x="302" y="472" width="420" height="24" rx="12" fill="url(#ectoglow)"/>

      <!-- Endoderm (Blue) - Bottom Layer -->
      <!-- Roof of the yolk sac -->
      <path d="M 332 532 Q 512 504 692 532 Q 512 562 332 532 Z" fill="url(#endoglow)"/>
      <rect x="302" y="528" width="420" height="24" rx="12" fill="url(#endoglow)"/>
      
    </g> <!-- End inside layers -->
  </g> <!-- End chorion -->

</svg>
